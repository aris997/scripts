name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Shellcheck Scripts
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck *.sh

      - name: Syntax check
        run: |
          for f in *.sh; do
            echo "Checking $f..."
            bash -n "$f"
          done
